---
deployment:
  tasks:
    - export DEPLOYPATH=/home/tallowsk
    - /bin/mkdir -p $DEPLOYPATH/beauty
    - /bin/cp -R * $DEPLOYPATH/beauty
    - cd $DEPLOYPATH/beauty
    - composer install --no-dev --optimize-autoloader
    - php artisan config:cache
    - php artisan route:cache
    - php artisan view:cache
    - /bin/chmod -R 775 storage
    - /bin/chmod -R 775 bootstrap/cache